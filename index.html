<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Aufgabenmanager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8 selection:bg-indigo-200 selection:text-indigo-900">
    
    <div class="max-w-5xl mx-auto" x-data="taskApp()">
        
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Aufgaben</h1>
            <p class="text-slate-500 mt-1">Verwalte deine Projekte und Deadlines</p>
        </header>

        <form @submit.prevent="addTask" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-8">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-4">
                <div class="md:col-span-12">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Was muss erledigt werden?</label>
                    <input 
                        x-model="newTask.title" 
                        type="text" 
                        placeholder="Aufgabentitel eingeben..." 
                        class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 focus:bg-white transition-all" 
                        required>
                </div>
                
                <div class="md:col-span-4">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Kategorie</label>
                    <select 
                        x-model="newTask.category" 
                        class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 focus:bg-white cursor-pointer h-[50px]">
                        <option value="Allgemein">Allgemein</option>
                        <option value="Arbeit">Arbeit</option>
                        <option value="Privat">Privat</option>
                        <option value="Studium">Studium</option>
                    </select>
                </div>

                <div class="md:col-span-4">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Priorität</label>
                    <select 
                        x-model="newTask.priority" 
                        class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 focus:bg-white cursor-pointer font-medium h-[50px]"
                        :class="{'text-red-600': newTask.priority === 'Hoch', 'text-amber-600': newTask.priority === 'Mittel', 'text-emerald-600': newTask.priority === 'Niedrig'}">
                        <option value="Niedrig" class="text-emerald-600">Niedrig</option>
                        <option value="Mittel" class="text-amber-600">Mittel</option>
                        <option value="Hoch" class="text-red-600">Hoch</option>
                    </select>
                </div>

                <div class="md:col-span-4">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Fälligkeitsdatum</label>
                    <input 
                        type="date" 
                        x-model="newTask.deadline" 
                        class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 focus:bg-white cursor-pointer text-slate-700 h-[50px]">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-9">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Details (Optional)</label>
                    <textarea 
                        x-model="newTask.description" 
                        placeholder="Zusätzliche Informationen zur Aufgabe..." 
                        class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 focus:bg-white resize-none h-[50px] transition-all"></textarea>
                </div>
                
                <div class="md:col-span-3">
                    <button 
                        type="submit" 
                        class="w-full bg-indigo-600 text-white font-semibold px-6 py-3 rounded-xl hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-sm h-[50px] flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Erstellen
                    </button>
                </div>
            </div>
        </form>

        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
            
            <div class="flex bg-slate-100 p-1 rounded-xl w-full lg:w-auto">
                <button @click="filterStatus = 'all'" :class="filterStatus === 'all' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'" class="flex-1 lg:flex-none px-4 py-2 rounded-lg font-medium text-sm transition-all">Alle</button>
                <button @click="filterStatus = 'active'" :class="filterStatus === 'active' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'" class="flex-1 lg:flex-none px-4 py-2 rounded-lg font-medium text-sm transition-all">Offen</button>
                <button @click="filterStatus = 'completed'" :class="filterStatus === 'completed' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'" class="flex-1 lg:flex-none px-4 py-2 rounded-lg font-medium text-sm transition-all">Erledigt</button>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                <select x-model="filterCategory" class="p-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 cursor-pointer font-medium text-slate-700 w-full sm:w-auto">
                    <option value="all">Alle Kategorien</option>
                    <option value="Allgemein">Allgemein</option>
                    <option value="Arbeit">Arbeit</option>
                    <option value="Privat">Privat</option>
                    <option value="Studium">Studium</option>
                </select>

                <select x-model="filterPriority" class="p-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 cursor-pointer font-medium text-slate-700 w-full sm:w-auto">
                    <option value="all">Alle Prioritäten</option>
                    <option value="Hoch">Hoch</option>
                    <option value="Mittel">Mittel</option>
                    <option value="Niedrig">Niedrig</option>
                </select>

                <select x-model="sortBy" class="p-2.5 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 cursor-pointer font-medium text-slate-700 w-full sm:w-auto">
                    <option value="newest">Neueste zuerst</option>
                    <option value="oldest">Älteste zuerst</option>
                    <option value="deadline">Nach Deadline</option>
                </select>
            </div>
        </div>

        <ul class="space-y-3">
            <template x-for="task in getFilteredAndSortedTasks()" :key="task.id">
                <li x-data="{ expanded: false }" class="group bg-white border rounded-2xl transition-all duration-200 hover:border-indigo-300" :class="[task.completed ? 'opacity-60 border-slate-200 bg-slate-50' : 'border-slate-200 shadow-sm', task.pinned ? 'ring-1 ring-indigo-500 shadow-md' : '']">
                    
                    <div class="flex items-center justify-between p-4 sm:p-5 cursor-pointer" @click="if($event.target.tagName !== 'INPUT' && $event.target.tagName !== 'BUTTON' && !$event.target.closest('button')) expanded = !expanded">
                        
                        <div class="flex items-center gap-4 flex-1 min-w-0">
                            <input 
                                type="checkbox" 
                                x-model="task.completed" 
                                @change="saveTasks" 
                                class="w-5 h-5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer transition-colors flex-shrink-0">
                            
                            <div class="flex flex-col flex-1 min-w-0">
                                <template x-if="editingId !== task.id">
                                    <div class="flex items-center gap-2">
                                        <p class="text-base sm:text-lg font-semibold truncate transition-colors" :class="task.completed ? 'line-through text-slate-400' : 'text-slate-900'" x-text="task.title"></p>
                                        <svg x-show="task.pinned" class="w-4 h-4 text-indigo-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                                    </div>
                                </template>
                                
                                <template x-if="editingId === task.id">
                                    <input type="text" x-model="editingText" class="p-2 border border-indigo-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full mb-2 text-sm" @keyup.enter="saveEdit(task)" @click.stop>
                                </template>

                                <div class="flex flex-wrap gap-2 mt-1.5" x-show="editingId !== task.id">
                                    <span class="text-[11px] font-bold px-2.5 py-0.5 rounded-md uppercase tracking-wide border" 
                                          :class="{'bg-red-50 text-red-700 border-red-200': task.priority === 'Hoch', 'bg-amber-50 text-amber-700 border-amber-200': task.priority === 'Mittel', 'bg-emerald-50 text-emerald-700 border-emerald-200': task.priority === 'Niedrig'}" 
                                          x-text="task.priority"></span>
                                    <span class="text-[11px] font-bold px-2.5 py-0.5 bg-slate-100 text-slate-600 border border-slate-200 rounded-md uppercase tracking-wide" x-text="task.category"></span>
                                    <template x-if="task.deadline">
                                        <span class="text-[11px] font-bold px-2.5 py-0.5 flex items-center gap-1 rounded-md border uppercase tracking-wide" 
                                              :class="(new Date(task.deadline) < new Date() && !task.completed) ? 'bg-red-50 text-red-700 border-red-200' : 'bg-slate-50 text-slate-600 border-slate-200'">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                            <span x-text="new Date(task.deadline).toLocaleDateString('de-DE')"></span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0 ml-4">
                            <button @click.stop="togglePin(task)" class="p-2 rounded-lg transition-colors" :class="task.pinned ? 'bg-indigo-50 text-indigo-700' : 'text-slate-400 hover:bg-slate-100 hover:text-slate-700'" title="Anpinnen">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                            </button>
                            <svg class="w-5 h-5 text-slate-400 transform transition-transform duration-200" :class="expanded ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>

                    <div x-show="expanded" x-collapse x-cloak class="px-4 sm:px-5 pb-5 pt-1 border-t border-slate-100 mt-1">
                        <div class="bg-slate-50/50 rounded-xl p-4 text-slate-600 text-sm whitespace-pre-wrap border border-slate-100" x-text="task.description || 'Keine Beschreibung vorhanden.'"></div>
                        
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-4 gap-4">
                            <div class="text-xs text-slate-400 flex items-center gap-1.5 font-medium">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Erstellt am <span x-text="new Date(task.timestamp).toLocaleString('de-DE', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'})"></span>
                            </div>
                            
                            <div class="flex gap-2 w-full sm:w-auto">
                                <template x-if="editingId === task.id">
                                    <button @click.stop="saveEdit(task)" class="flex-1 sm:flex-none bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 text-sm font-semibold transition-colors">Speichern</button>
                                </template>
                                <template x-if="editingId === task.id">
                                    <button @click.stop="cancelEdit()" class="flex-1 sm:flex-none bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 text-sm font-semibold transition-colors">Abbrechen</button>
                                </template>
                                
                                <template x-if="editingId !== task.id">
                                    <button @click.stop="startEdit(task)" class="flex-1 sm:flex-none text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-lg transition-colors font-medium text-sm shadow-sm">Bearbeiten</button>
                                </template>
                                <template x-if="editingId !== task.id">
                                    <button @click.stop="deleteTask(task.id)" class="flex-1 sm:flex-none text-red-700 bg-white border border-slate-300 hover:bg-red-50 hover:border-red-200 px-4 py-2 rounded-lg transition-colors font-medium text-sm shadow-sm">Löschen</button>
                                </template>
                            </div>
                        </div>
                    </div>
                </li>
            </template>
            
            <li x-show="getFilteredAndSortedTasks().length === 0" class="text-center p-12 text-slate-500 border-2 border-dashed border-slate-200 rounded-2xl bg-white">
                <div class="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                </div>
                <p class="text-lg font-semibold text-slate-700">Nichts gefunden</p>
                <p class="text-sm mt-1">Es gibt keine Aufgaben, die deinen Filtern entsprechen.</p>
            </li>
        </ul>
    </div>

    <script>
        function taskApp() {
            return {
                tasks: JSON.parse(localStorage.getItem('tasks') || '[]'),
                newTask: {
                    title: '',
                    category: 'Allgemein',
                    priority: 'Niedrig',
                    description: '',
                    deadline: ''
                },
                filterStatus: 'all',
                filterCategory: 'all',
                filterPriority: 'all',
                sortBy: 'newest',
                editingId: null,
                editingText: '',

                saveTasks() {
                    localStorage.setItem('tasks', JSON.stringify(this.tasks));
                },

                addTask() {
                    if (this.newTask.title.trim() === '') return;
                    this.tasks.push({
                        id: Date.now(),
                        title: this.newTask.title.trim(),
                        category: this.newTask.category,
                        priority: this.newTask.priority,
                        description: this.newTask.description.trim(),
                        deadline: this.newTask.deadline,
                        completed: false,
                        pinned: false,
                        timestamp: Date.now()
                    });
                    this.newTask = { title: '', category: 'Allgemein', priority: 'Niedrig', description: '', deadline: '' };
                    this.saveTasks();
                },

                deleteTask(id) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                },

                togglePin(task) {
                    const index = this.tasks.findIndex(t => t.id === task.id);
                    if (index !== -1) {
                        this.tasks[index].pinned = !this.tasks[index].pinned;
                        this.saveTasks();
                    }
                },

                startEdit(task) {
                    this.editingId = task.id;
                    this.editingText = task.title;
                },

                saveEdit(task) {
                    if (this.editingText.trim() !== '') {
                        const index = this.tasks.findIndex(t => t.id === task.id);
                        if (index !== -1) {
                            this.tasks[index].title = this.editingText.trim();
                            this.saveTasks();
                        }
                    }
                    this.editingId = null;
                },

                cancelEdit() {
                    this.editingId = null;
                },

                getFilteredAndSortedTasks() {
                    let filtered = this.tasks;

                    if (this.filterStatus === 'active') {
                        filtered = filtered.filter(t => !t.completed);
                    } else if (this.filterStatus === 'completed') {
                        filtered = filtered.filter(t => t.completed);
                    }

                    if (this.filterCategory !== 'all') {
                        filtered = filtered.filter(t => t.category === this.filterCategory);
                    }

                    if (this.filterPriority !== 'all') {
                        filtered = filtered.filter(t => t.priority === this.filterPriority);
                    }

                    return filtered.sort((a, b) => {
                        if (a.pinned !== b.pinned) {
                            return a.pinned ? -1 : 1;
                        }

                        if (this.sortBy === 'deadline') {
                            if (!a.deadline && !b.deadline) return 0;
                            if (!a.deadline) return 1;
                            if (!b.deadline) return -1;
                            return new Date(a.deadline) - new Date(b.deadline);
                        }

                        if (this.sortBy === 'newest') {
                            return b.timestamp - a.timestamp;
                        } else {
                            return a.timestamp - b.timestamp;
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
