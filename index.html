<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erweiterter Aufgabenmanager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-200 via-purple-100 to-pink-200 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8 selection:bg-indigo-300 selection:text-indigo-900">
    
    <div class="max-w-4xl mx-auto bg-white/90 backdrop-blur-md p-6 md:p-10 rounded-3xl shadow-2xl border border-white/50" x-data="taskApp()">
        
        <h1 class="text-4xl font-extrabold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-600 tracking-tight">
            Aufgabenmanager
        </h1>

        <form @submit.prevent="addTask" class="flex flex-col gap-4 mb-10 bg-white/60 p-6 rounded-2xl border border-white shadow-sm">
            <div class="flex flex-col md:flex-row gap-4">
                <input 
                    x-model="newTask.title" 
                    type="text" 
                    placeholder="Was muss erledigt werden?" 
                    class="flex-1 p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 transition-all text-lg" 
                    required>
                <select 
                    x-model="newTask.category" 
                    class="p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 cursor-pointer">
                    <option value="Allgemein">Allgemein</option>
                    <option value="Arbeit">Arbeit</option>
                    <option value="Privat">Privat</option>
                    <option value="Studium">Studium</option>
                </select>
                <select 
                    x-model="newTask.priority" 
                    class="p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 cursor-pointer font-medium"
                    :class="{'text-red-600': newTask.priority === 'Hoch', 'text-yellow-600': newTask.priority === 'Mittel', 'text-green-600': newTask.priority === 'Niedrig'}">
                    <option value="Niedrig" class="text-green-600">Niedrig</option>
                    <option value="Mittel" class="text-yellow-600">Mittel</option>
                    <option value="Hoch" class="text-red-600">Hoch</option>
                </select>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4">
                <textarea 
                    x-model="newTask.description" 
                    placeholder="Details zur Aufgabe hinzufügen..." 
                    class="flex-1 p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 resize-none h-20 transition-all"></textarea>
                
                <div class="flex flex-col gap-4">
                    <input 
                        type="date" 
                        x-model="newTask.deadline" 
                        class="p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 cursor-pointer w-full md:w-48 text-slate-600">
                    
                    <button 
                        type="submit" 
                        class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold px-8 py-4 rounded-xl hover:opacity-90 active:transform active:scale-95 transition-all shadow-lg hover:shadow-indigo-500/30 w-full md:w-48">
                        Hinzufügen
                    </button>
                </div>
            </div>
        </form>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-white/60 p-4 rounded-2xl border border-white shadow-sm">
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 hide-scrollbar">
                <button @click="filter = 'all'" :class="filter === 'all' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white/80 text-slate-600 border border-slate-200 hover:bg-slate-50'" class="px-5 py-2.5 rounded-xl font-medium transition-all whitespace-nowrap">Alle</button>
                <button @click="filter = 'active'" :class="filter === 'active' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white/80 text-slate-600 border border-slate-200 hover:bg-slate-50'" class="px-5 py-2.5 rounded-xl font-medium transition-all whitespace-nowrap">Offen</button>
                <button @click="filter = 'completed'" :class="filter === 'completed' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white/80 text-slate-600 border border-slate-200 hover:bg-slate-50'" class="px-5 py-2.5 rounded-xl font-medium transition-all whitespace-nowrap">Erledigt</button>
            </div>
            <select x-model="sortBy" class="w-full md:w-auto p-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 cursor-pointer font-medium text-slate-700">
                <option value="newest">Erstellt: Neueste zuerst</option>
                <option value="oldest">Erstellt: Älteste zuerst</option>
                <option value="deadline">Nach Deadline</option>
            </select>
        </div>

        <ul class="space-y-4">
            <template x-for="task in getFilteredAndSortedTasks()" :key="task.id">
                <li x-data="{ expanded: false }" class="group bg-white border rounded-2xl transition-all duration-300 hover:shadow-lg" :class="[task.completed ? 'opacity-60 border-slate-200' : 'border-slate-100', task.pinned ? 'ring-2 ring-indigo-400/50 shadow-md' : '']">
                    
                    <div class="flex items-center justify-between p-5 cursor-pointer" @click="if($event.target.tagName !== 'INPUT' && $event.target.tagName !== 'BUTTON' && !$event.target.closest('button')) expanded = !expanded">
                        
                        <div class="flex items-center gap-4 flex-1">
                            <input 
                                type="checkbox" 
                                x-model="task.completed" 
                                @change="saveTasks" 
                                class="w-6 h-6 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer transition-colors">
                            
                            <div class="flex flex-col flex-1">
                                <template x-if="editingId !== task.id">
                                    <div class="flex items-center gap-2">
                                        <p class="text-xl font-semibold break-all transition-colors" :class="task.completed ? 'line-through text-slate-400' : 'text-slate-800'" x-text="task.title"></p>
                                        <svg x-show="task.pinned" class="w-5 h-5 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                                    </div>
                                </template>
                                
                                <template x-if="editingId === task.id">
                                    <input type="text" x-model="editingText" class="p-2 border border-indigo-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full mb-2" @keyup.enter="saveEdit(task)" @click.stop>
                                </template>

                                <div class="flex flex-wrap gap-2 mt-2" x-show="editingId !== task.id">
                                    <span class="text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider" 
                                          :class="{'bg-red-100 text-red-700': task.priority === 'Hoch', 'bg-yellow-100 text-yellow-700': task.priority === 'Mittel', 'bg-green-100 text-green-700': task.priority === 'Niedrig'}" 
                                          x-text="task.priority"></span>
                                    <span class="text-xs font-bold px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full uppercase tracking-wider" x-text="task.category"></span>
                                    <template x-if="task.deadline">
                                        <span class="text-xs font-medium px-3 py-1 flex items-center gap-1 rounded-full border" 
                                              :class="(new Date(task.deadline) < new Date() && !task.completed) ? 'bg-red-50 text-red-600 border-red-200' : 'bg-slate-50 text-slate-600 border-slate-200'">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                            <span x-text="new Date(task.deadline).toLocaleDateString('de-DE')"></span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <button @click.stop="togglePin(task)" class="p-2 rounded-xl transition-colors" :class="task.pinned ? 'bg-indigo-100 text-indigo-700' : 'text-slate-400 hover:bg-slate-100 hover:text-slate-600'" title="Anpinnen">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                            </button>
                            <svg class="w-6 h-6 text-slate-400 transform transition-transform duration-300" :class="expanded ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>

                    <div x-show="expanded" x-collapse x-cloak class="px-5 pb-5 pt-2 border-t border-slate-100">
                        <div class="bg-slate-50 rounded-xl p-4 text-slate-700 text-sm whitespace-pre-wrap" x-text="task.description || 'Keine Beschreibung vorhanden.'"></div>
                        
                        <div class="flex justify-between items-end mt-4">
                            <div class="text-xs text-slate-400 flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Erstellt am <span x-text="new Date(task.timestamp).toLocaleString('de-DE')"></span>
                            </div>
                            
                            <div class="flex gap-2">
                                <template x-if="editingId === task.id">
                                    <button @click.stop="saveEdit(task)" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 text-sm font-medium transition-colors shadow-sm">Speichern</button>
                                </template>
                                <template x-if="editingId === task.id">
                                    <button @click.stop="cancelEdit()" class="bg-slate-400 text-white px-4 py-2 rounded-lg hover:bg-slate-500 text-sm font-medium transition-colors shadow-sm">Abbrechen</button>
                                </template>
                                
                                <template x-if="editingId !== task.id">
                                    <button @click.stop="startEdit(task)" class="text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-500 px-4 py-2 rounded-lg transition-colors font-medium text-sm border border-blue-200 hover:border-blue-500">Titel bearbeiten</button>
                                </template>
                                <template x-if="editingId !== task.id">
                                    <button @click.stop="deleteTask(task.id)" class="text-red-600 hover:text-white bg-red-50 hover:bg-red-500 px-4 py-2 rounded-lg transition-colors font-medium text-sm border border-red-200 hover:border-red-500">Löschen</button>
                                </template>
                            </div>
                        </div>
                    </div>
                </li>
            </template>
            
            <li x-show="getFilteredAndSortedTasks().length === 0" class="text-center p-12 text-slate-500 border-2 border-dashed border-white rounded-3xl bg-white/40 backdrop-blur-sm">
                <svg class="w-16 h-16 mx-auto text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <p class="text-lg font-medium">Keine Aufgaben gefunden</p>
                <p class="text-sm mt-1">Füge eine neue Aufgabe hinzu oder ändere den Filter.</p>
            </li>
        </ul>
    </div>

    <script>
        function taskApp() {
            return {
                tasks: JSON.parse(localStorage.getItem('tasks') || '[]'),
                newTask: {
                    title: '',
                    category: 'Allgemein',
                    priority: 'Niedrig',
                    description: '',
                    deadline: ''
                },
                filter: 'all',
                sortBy: 'newest',
                editingId: null,
                editingText: '',

                saveTasks() {
                    localStorage.setItem('tasks', JSON.stringify(this.tasks));
                },

                addTask() {
                    if (this.newTask.title.trim() === '') return;
                    this.tasks.push({
                        id: Date.now(),
                        title: this.newTask.title.trim(),
                        category: this.newTask.category,
                        priority: this.newTask.priority,
                        description: this.newTask.description.trim(),
                        deadline: this.newTask.deadline,
                        completed: false,
                        pinned: false,
                        timestamp: Date.now()
                    });
                    this.newTask = { title: '', category: 'Allgemein', priority: 'Niedrig', description: '', deadline: '' };
                    this.saveTasks();
                },

                deleteTask(id) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                },

                togglePin(task) {
                    const index = this.tasks.findIndex(t => t.id === task.id);
                    if (index !== -1) {
                        this.tasks[index].pinned = !this.tasks[index].pinned;
                        this.saveTasks();
                    }
                },

                startEdit(task) {
                    this.editingId = task.id;
                    this.editingText = task.title;
                },

                saveEdit(task) {
                    if (this.editingText.trim() !== '') {
                        const index = this.tasks.findIndex(t => t.id === task.id);
                        if (index !== -1) {
                            this.tasks[index].title = this.editingText.trim();
                            this.saveTasks();
                        }
                    }
                    this.editingId = null;
                },

                cancelEdit() {
                    this.editingId = null;
                },

                getFilteredAndSortedTasks() {
                    let filtered = this.tasks;

                    if (this.filter === 'active') {
                        filtered = filtered.filter(t => !t.completed);
                    } else if (this.filter === 'completed') {
                        filtered = filtered.filter(t => t.completed);
                    }

                    return filtered.sort((a, b) => {
                        if (a.pinned !== b.pinned) {
                            return a.pinned ? -1 : 1;
                        }

                        if (this.sortBy === 'deadline') {
                            if (!a.deadline && !b.deadline) return 0;
                            if (!a.deadline) return 1;
                            if (!b.deadline) return -1;
                            return new Date(a.deadline) - new Date(b.deadline);
                        }

                        if (this.sortBy === 'newest') {
                            return b.timestamp - a.timestamp;
                        } else {
                            return a.timestamp - b.timestamp;
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
