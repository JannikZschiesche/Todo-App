<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Aufgabenmanager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 10s infinite alternate ease-in-out;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8 selection:bg-indigo-200 selection:text-indigo-900 relative">
    
    <div class="fixed inset-0 z-[-1] overflow-hidden bg-slate-50">
        <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-indigo-200/50 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[35vw] h-[35vw] bg-violet-200/50 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-10%] left-[20%] w-[45vw] h-[45vw] bg-fuchsia-200/50 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <div class="max-w-5xl mx-auto relative z-10" x-data="taskApp()">
        
        <header class="mb-8 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-violet-600 tracking-tight mb-2">Aufgaben</h1>
                <p class="text-slate-600 font-medium">Verwalte deine Projekte und Deadlines effizient</p>
            </div>
        </header>

        <form @submit.prevent="addTask" class="bg-white/90 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-xl border border-white/50 mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 via-violet-500 to-fuchsia-500"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-5 mb-5 mt-2">
                <div class="md:col-span-12">
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Was muss erledigt werden?</label>
                    <input 
                        x-model="newTask.title" 
                        type="text" 
                        placeholder="Aufgabentitel eingeben..." 
                        class="w-full p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 focus:bg-white transition-all text-lg font-medium shadow-inner" 
                        required>
                </div>
                
                <div class="md:col-span-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Kategorie</label>
                    <select 
                        x-model="newTask.category" 
                        class="w-full p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 focus:bg-white cursor-pointer h-[58px] font-medium shadow-inner">
                        <option value="Allgemein">Allgemein</option>
                        <option value="Arbeit">Arbeit</option>
                        <option value="Privat">Privat</option>
                        <option value="Studium">Studium</option>
                    </select>
                </div>

                <div class="md:col-span-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Priorität</label>
                    <select 
                        x-model="newTask.priority" 
                        class="w-full p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 focus:bg-white cursor-pointer font-bold h-[58px] shadow-inner"
                        :class="{'text-red-600': newTask.priority === 'Hoch', 'text-amber-600': newTask.priority === 'Mittel', 'text-emerald-600': newTask.priority === 'Niedrig'}">
                        <option value="Niedrig" class="text-emerald-600">Niedrig</option>
                        <option value="Mittel" class="text-amber-600">Mittel</option>
                        <option value="Hoch" class="text-red-600">Hoch</option>
                    </select>
                </div>

                <div class="md:col-span-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Fälligkeitsdatum</label>
                    <input 
                        type="date" 
                        x-model="newTask.deadline" 
                        class="w-full p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 focus:bg-white cursor-pointer text-slate-700 h-[58px] font-medium shadow-inner">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Details (Optional)</label>
                    <textarea 
                        x-model="newTask.description" 
                        placeholder="Zusätzliche Informationen zur Aufgabe..." 
                        class="w-full p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 focus:bg-white min-h-[120px] resize-y transition-all shadow-inner"></textarea>
                </div>
                
                <div class="flex justify-end">
                    <button 
                        type="submit" 
                        class="w-full md:w-auto bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold px-10 py-4 rounded-xl hover:from-indigo-700 hover:to-violet-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200/50 flex items-center justify-center gap-2 text-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Aufgabe erstellen
                    </button>
                </div>
            </div>
        </form>

        <div class="bg-white/90 backdrop-blur-sm p-5 rounded-2xl shadow-sm border border-white/50 mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-5">
            
            <div class="flex bg-slate-100/80 p-1.5 rounded-xl w-full lg:w-auto shadow-inner">
                <button @click="filterStatus = 'all'" :class="filterStatus === 'all' ? 'bg-white shadow-sm text-indigo-700 font-bold' : 'text-slate-600 hover:text-slate-900 font-medium'" class="flex-1 lg:flex-none px-6 py-2.5 rounded-lg text-sm transition-all">Alle</button>
                <button @click="filterStatus = 'active'" :class="filterStatus === 'active' ? 'bg-white shadow-sm text-indigo-700 font-bold' : 'text-slate-600 hover:text-slate-900 font-medium'" class="flex-1 lg:flex-none px-6 py-2.5 rounded-lg text-sm transition-all">Offen</button>
                <button @click="filterStatus = 'completed'" :class="filterStatus === 'completed' ? 'bg-white shadow-sm text-indigo-700 font-bold' : 'text-slate-600 hover:text-slate-900 font-medium'" class="flex-1 lg:flex-none px-6 py-2.5 rounded-lg text-sm transition-all">Erledigt</button>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
                <select x-model="filterCategory" class="p-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 cursor-pointer font-bold text-slate-700 w-full sm:w-auto hover:bg-white transition-colors shadow-sm">
                    <option value="all">Alle Kategorien</option>
                    <option value="Allgemein">Allgemein</option>
                    <option value="Arbeit">Arbeit</option>
                    <option value="Privat">Privat</option>
                    <option value="Studium">Studium</option>
                </select>

                <select x-model="filterPriority" class="p-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 cursor-pointer font-bold text-slate-700 w-full sm:w-auto hover:bg-white transition-colors shadow-sm">
                    <option value="all">Alle Prioritäten</option>
                    <option value="Hoch">Hoch</option>
                    <option value="Mittel">Mittel</option>
                    <option value="Niedrig">Niedrig</option>
                </select>

                <select x-model="sortBy" class="p-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/50 cursor-pointer font-bold text-slate-700 w-full sm:w-auto hover:bg-white transition-colors shadow-sm">
                    <option value="newest">Neueste zuerst</option>
                    <option value="oldest">Älteste zuerst</option>
                    <option value="deadline">Nach Deadline</option>
                </select>
            </div>
        </div>

        <ul class="space-y-4">
            <template x-for="task in getFilteredAndSortedTasks()" :key="task.id">
                <li x-data="{ expanded: false }" class="group bg-white/95 backdrop-blur-sm rounded-2xl transition-all duration-300 shadow-sm hover:shadow-lg" :class="[task.completed ? 'opacity-75 bg-slate-50/90 border border-slate-200' : 'border border-white/50', task.pinned ? 'ring-2 ring-violet-500 border-transparent shadow-md' : 'hover:border-indigo-300']">
                    
                    <div class="flex items-start sm:items-center justify-between p-5 cursor-pointer" @click="if($event.target.tagName !== 'INPUT' && $event.target.tagName !== 'BUTTON' && !$event.target.closest('button')) expanded = !expanded">
                        
                        <div class="flex items-start sm:items-center gap-5 flex-1 min-w-0">
                            <input 
                                type="checkbox" 
                                x-model="task.completed" 
                                @change="saveTasks" 
                                class="w-6 h-6 mt-1 sm:mt-0 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer transition-colors flex-shrink-0 shadow-inner">
                            
                            <div class="flex flex-col flex-1 min-w-0">
                                <template x-if="editingId !== task.id">
                                    <div class="flex items-center gap-3">
                                        <p class="text-lg sm:text-xl font-bold truncate transition-colors" :class="task.completed ? 'line-through text-slate-400' : 'text-slate-800'" x-text="task.title"></p>
                                        <svg x-show="task.pinned" class="w-5 h-5 text-violet-600 flex-shrink-0 drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                                    </div>
                                </template>
                                
                                <template x-if="editingId === task.id">
                                    <input type="text" x-model="editingText" class="p-3 border border-indigo-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600 w-full mb-3 text-base font-medium shadow-inner bg-white" @keyup.enter="saveEdit(task)" @click.stop>
                                </template>

                                <div class="flex flex-wrap gap-2.5 mt-2" x-show="editingId !== task.id">
                                    <span class="text-xs font-bold px-3 py-1 rounded-md uppercase tracking-wider border" 
                                          :class="{'bg-red-50 text-red-700 border-red-200': task.priority === 'Hoch', 'bg-amber-50 text-amber-700 border-amber-200': task.priority === 'Mittel', 'bg-emerald-50 text-emerald-700 border-emerald-200': task.priority === 'Niedrig'}" 
                                          x-text="task.priority"></span>
                                    <span class="text-xs font-bold px-3 py-1 bg-slate-100/80 text-slate-600 border border-slate-200 rounded-md uppercase tracking-wider shadow-sm" x-text="task.category"></span>
                                    <template x-if="task.deadline">
                                        <span class="text-xs font-bold px-3 py-1 flex items-center gap-1.5 rounded-md border uppercase tracking-wider shadow-sm" 
                                              :class="(new Date(task.deadline) < new Date() && !task.completed) ? 'bg-red-50 text-red-700 border-red-200' : 'bg-white text-slate-600 border-slate-200'">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                            <span x-text="new Date(task.deadline).toLocaleDateString('de-DE')"></span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0 ml-4">
                            <button @click.stop="togglePin(task)" class="p-2.5 rounded-xl transition-all" :class="task.pinned ? 'bg-violet-100 text-violet-700 shadow-inner' : 'text-slate-400 hover:bg-slate-100 hover:text-slate-700'" title="Anpinnen">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                            </button>
                            <div class="p-2.5 rounded-xl text-slate-400 hover:bg-slate-100 transition-colors">
                                <svg class="w-5 h-5 transform transition-transform duration-300" :class="expanded ? 'rotate-180 text-indigo-600' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div x-show="expanded" x-collapse x-cloak class="px-5 pb-5 pt-2 border-t border-slate-100/50">
                        <div class="bg-slate-50/80 rounded-xl p-5 text-slate-700 text-base whitespace-pre-wrap border border-slate-200/60 shadow-inner break-words break-all" x-text="task.description || 'Keine Beschreibung vorhanden.'"></div>
                        
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-5 gap-4">
                            <div class="text-sm text-slate-500 flex items-center gap-2 font-medium">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Erstellt am <span x-text="new Date(task.timestamp).toLocaleString('de-DE', {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'})"></span>
                            </div>
                            
                            <div class="flex gap-3 w-full sm:w-auto">
                                <template x-if="editingId === task.id">
                                    <button @click.stop="saveEdit(task)" class="flex-1 sm:flex-none bg-emerald-600 text-white px-5 py-2.5 rounded-xl hover:bg-emerald-700 text-sm font-bold transition-colors shadow-sm">Speichern</button>
                                </template>
                                <template x-if="editingId === task.id">
                                    <button @click.stop="cancelEdit()" class="flex-1 sm:flex-none bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl hover:bg-slate-300 text-sm font-bold transition-colors shadow-sm">Abbrechen</button>
                                </template>
                                
                                <template x-if="editingId !== task.id">
                                    <button @click.stop="startEdit(task)" class="flex-1 sm:flex-none text-indigo-700 bg-indigo-50 border border-indigo-200 hover:bg-indigo-600 hover:text-white px-5 py-2.5 rounded-xl transition-all font-bold text-sm shadow-sm">Bearbeiten</button>
                                </template>
                                <template x-if="editingId !== task.id">
                                    <button @click.stop="deleteTask(task.id)" class="flex-1 sm:flex-none text-red-700 bg-red-50 border border-red-200 hover:bg-red-600 hover:text-white px-5 py-2.5 rounded-xl transition-all font-bold text-sm shadow-sm">Löschen</button>
                                </template>
                            </div>
                        </div>
                    </div>
                </li>
            </template>
            
            <li x-show="getFilteredAndSortedTasks().length === 0" class="text-center p-16 text-slate-500 border-2 border-dashed border-slate-300/50 rounded-3xl bg-white/60 backdrop-blur-sm shadow-sm">
                <div class="bg-indigo-50/80 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                    <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                </div>
                <p class="text-xl font-bold text-slate-800">Nichts gefunden</p>
                <p class="text-base mt-2 font-medium">Es gibt keine Aufgaben, die deinen aktuellen Filtern entsprechen.</p>
            </li>
        </ul>
    </div>

    <script>
        function taskApp() {
            return {
                tasks: JSON.parse(localStorage.getItem('tasks') || '[]'),
                newTask: {
                    title: '',
                    category: 'Allgemein',
                    priority: 'Niedrig',
                    description: '',
                    deadline: ''
                },
                filterStatus: 'all',
                filterCategory: 'all',
                filterPriority: 'all',
                sortBy: 'newest',
                editingId: null,
                editingText: '',

                saveTasks() {
                    localStorage.setItem('tasks', JSON.stringify(this.tasks));
                },

                addTask() {
                    if (this.newTask.title.trim() === '') return;
                    this.tasks.push({
                        id: Date.now(),
                        title: this.newTask.title.trim(),
                        category: this.newTask.category,
                        priority: this.newTask.priority,
                        description: this.newTask.description.trim(),
                        deadline: this.newTask.deadline,
                        completed: false,
                        pinned: false,
                        timestamp: Date.now()
                    });
                    this.newTask = { title: '', category: 'Allgemein', priority: 'Niedrig', description: '', deadline: '' };
                    this.saveTasks();
                },

                deleteTask(id) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                },

                togglePin(task) {
                    const index = this.tasks.findIndex(t => t.id === task.id);
                    if (index !== -1) {
                        this.tasks[index].pinned = !this.tasks[index].pinned;
                        this.saveTasks();
                    }
                },

                startEdit(task) {
                    this.editingId = task.id;
                    this.editingText = task.title;
                },

                saveEdit(task) {
                    if (this.editingText.trim() !== '') {
                        const index = this.tasks.findIndex(t => t.id === task.id);
                        if (index !== -1) {
                            this.tasks[index].title = this.editingText.trim();
                            this.saveTasks();
                        }
                    }
                    this.editingId = null;
                },

                cancelEdit() {
                    this.editingId = null;
                },

                getFilteredAndSortedTasks() {
                    let filtered = this.tasks;

                    if (this.filterStatus === 'active') {
                        filtered = filtered.filter(t => !t.completed);
                    } else if (this.filterStatus === 'completed') {
                        filtered = filtered.filter(t => t.completed);
                    }

                    if (this.filterCategory !== 'all') {
                        filtered = filtered.filter(t => t.category === this.filterCategory);
                    }

                    if (this.filterPriority !== 'all') {
                        filtered = filtered.filter(t => t.priority === this.filterPriority);
                    }

                    return filtered.sort((a, b) => {
                        if (a.pinned !== b.pinned) {
                            return a.pinned ? -1 : 1;
                        }

                        if (this.sortBy === 'deadline') {
                            if (!a.deadline && !b.deadline) return 0;
                            if (!a.deadline) return 1;
                            if (!b.deadline) return -1;
                            return new Date(a.deadline) - new Date(b.deadline);
                        }

                        if (this.sortBy === 'newest') {
                            return b.timestamp - a.timestamp;
                        } else {
                            return a.timestamp - b.timestamp;
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
